# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.17.0"
  sphinx_min: "7.0"
  sphinx_max: "10.0"
  python_check_max: "3.14"

package:
  name: pydata-sphinx-theme
  version: ${{ version }}

source:
  url: https://github.com/pydata/pydata-sphinx-theme/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 750cb543afb61e52bbd5c41b7b252194d2228a626eab2e49aba64e99f4b6f263

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation --disable-pip-version-check
    # - cd ${{ RECIPE_DIR }} && ${{ PYTHON }} collect_licenses.py

requirements:
  host:
    - pip
    - python ${{ python_min }}
    - setuptools
    - sphinx-theme-builder >=0.3.2
  run:
    - accessible-pygments
    - babel
    - beautifulsoup4
    - docutils !=0.17.0
    - pygments >=2.7
    - python >=${{ python_min }}
    - sphinx >=${{ min_sphinx }}
    - typing_extensions

tests:
  - python:
      imports: pydata_sphinx_theme
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - pytest-cov
        - pytest-playwright
        - pytest-regressions
        - python ${{ python_min }}.*
        - sphinx ${{ sphinx_min }}.*
    files:
      source:
        - tests/
    script:
      file: run_test.py

about:
  license: BSD-3-Clause
  license_file:
    - LICENSE
    # - third-party-licenses/
  summary: Bootstrap-based Sphinx theme from the PyData community
  homepage: https://pypi.org/project/pydata-sphinx-theme
  repository: https://github.com/pydata/pydata-sphinx-theme
  documentation: https://pydata-sphinx-theme.readthedocs.io/

extra:
  recipe-maintainers:
    - jorisvandenbossche
    - bollwyvl
    - michaelweinold
